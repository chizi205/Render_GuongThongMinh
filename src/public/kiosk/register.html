<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IGF Kiosk</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: Inter, Arial, sans-serif;
      }

      :root {
        --bg: #f5f7ff;
        --card: rgba(255, 255, 255, 0.92);
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --border: #e5e7eb;
        --danger: #dc2626;
        --success: #15803d;
        --shadow: 0 20px 60px rgba(79, 70, 229, 0.15);
        --radius: 24px;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at top left,
            rgba(99, 102, 241, 0.18),
            transparent 28%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(139, 92, 246, 0.16),
            transparent 28%
          ),
          var(--bg);
        color: var(--text);
      }

      .wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .card {
        width: 100%;
        max-width: 460px;
        background: var(--card);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 28px 24px 24px;
      }

      .brand {
        display: flex;
        justify-content: center;
        margin-bottom: 14px;
      }

      .brand-badge {
        min-width: 64px;
        height: 64px;
        border-radius: 18px;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 1px;
        box-shadow: 0 14px 30px rgba(79, 70, 229, 0.35);
      }

      .title {
        text-align: center;
        font-size: 26px;
        font-weight: 800;
        margin-bottom: 8px;
      }

      .subtitle {
        text-align: center;
        font-size: 14px;
        color: var(--muted);
        line-height: 1.5;
        margin-bottom: 22px;
      }

      .entry-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 20px;
      }

      .entry-btn,
      .switch-btn {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        padding: 14px 16px;
        border-radius: 16px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .entry-btn:hover,
      .switch-btn:hover {
        transform: translateY(-1px);
        border-color: #c7d2fe;
      }

      .entry-btn.active,
      .switch-btn.active {
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        color: #fff;
        border-color: transparent;
        box-shadow: 0 12px 22px rgba(79, 70, 229, 0.25);
      }

      .panel {
        display: none;
        animation: fadeIn 0.22s ease;
      }

      .panel.active {
        display: block;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 7px;
        font-size: 14px;
        font-weight: 700;
      }

      input,
      select {
        width: 100%;
        padding: 14px 15px;
        border: 1px solid var(--border);
        border-radius: 14px;
        outline: none;
        font-size: 15px;
        background: #fff;
        transition: 0.2s ease;
      }

      input:focus,
      select:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
      }

      .row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .checkbox-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin: 4px 0 18px;
        font-size: 14px;
        color: #4b5563;
        line-height: 1.45;
      }

      .checkbox-row input {
        width: auto;
        margin-top: 3px;
        transform: scale(1.05);
      }

      .submit-btn {
        width: 100%;
        border: none;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        color: white;
        padding: 15px;
        border-radius: 16px;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
        transition: 0.2s ease;
        box-shadow: 0 14px 25px rgba(79, 70, 229, 0.22);
      }

      .submit-btn:hover {
        transform: translateY(-1px);
      }

      .submit-btn:disabled {
        opacity: 0.75;
        cursor: not-allowed;
        transform: none;
      }

      .message {
        margin-top: 14px;
        font-size: 14px;
        text-align: center;
        min-height: 20px;
        font-weight: 600;
      }

      .success {
        color: var(--success);
      }

      .error {
        color: var(--danger);
      }

      .footer-note {
        margin-top: 18px;
        text-align: center;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.5;
      }

      .hidden {
        display: none !important;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 520px) {
        .card {
          padding: 24px 18px 20px;
          border-radius: 20px;
        }

        .title {
          font-size: 24px;
        }

        .row-2,
        .entry-actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        <div class="brand">
          <div class="brand-badge">IGF</div>
        </div>

        <div class="title">Chào mừng bạn</div>
        <div class="subtitle">
          Vui lòng chọn cách tiếp tục để sử dụng kiosk thử đồ
        </div>

        <div class="entry-actions">
          <button type="button" class="entry-btn active" id="showLoginBtn">
            Khách hàng
          </button>

          <button type="button" class="entry-btn" id="showStaffBtn">
            Nhân viên
          </button>

          <button type="button" class="entry-btn" id="showRegisterBtn">
            Đăng ký
          </button>
        </div>

        <!-- LOGIN PANEL -->
        <div class="panel active" id="loginPanel">
          <form id="loginForm">
            <input type="hidden" id="login_session_id" name="session_id" />

            <div class="form-group">
              <label for="login_phone">Số điện thoại</label>
              <input
                type="tel"
                id="login_phone"
                name="phone"
                placeholder="Nhập số điện thoại"
                required
              />
            </div>

            <div class="form-group">
              <label for="login_password">Mật khẩu</label>
              <input
                type="password"
                id="login_password"
                name="password"
                placeholder="Nhập mật khẩu"
                required
              />
            </div>

            <button type="submit" class="submit-btn" id="loginSubmitBtn">
              Đăng nhập
            </button>

            <div id="loginMessage" class="message"></div>
          </form>
        </div>

        <!-- STAFF LOGIN PANEL -->
        <div class="panel" id="staffPanel">
          <form id="staffForm">
            <div class="form-group">
              <label>Số điện thoại</label>
              <input type="tel" id="staff_phone" required />
            </div>

            <div class="form-group">
              <label>Mật khẩu</label>
              <input type="password" id="staff_password" required />
            </div>

            <button type="submit" class="submit-btn" id="staffSubmitBtn">
              Đăng nhập nhân viên
            </button>

            <div id="staffMessage" class="message"></div>
          </form>
        </div>

        <!-- REGISTER PANEL -->
        <div class="panel" id="registerPanel">
          <form id="registerForm">
            <input type="hidden" id="register_session_id" name="session_id" />

            <div class="form-group">
              <label for="full_name">Họ và tên</label>
              <input
                type="text"
                id="full_name"
                name="full_name"
                placeholder="Nhập họ và tên"
                required
              />
            </div>

            <div class="form-group">
              <label for="phone">Số điện thoại</label>
              <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="Nhập số điện thoại"
                required
              />
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Nhập email"
              />
            </div>

            <div class="form-group">
              <label for="address">Địa chỉ</label>
              <input
                type="text"
                id="address"
                name="address"
                placeholder="Nhập địa chỉ"
              />
            </div>

            <div class="row-2">
              <div class="form-group">
                <label for="gender">Giới tính</label>
                <select id="gender" name="gender">
                  <option value="">Chọn giới tính</option>
                  <option value="male">Nam</option>
                  <option value="female">Nữ</option>
                  <option value="other">Khác</option>
                </select>
              </div>

              <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Tạo mật khẩu"
                  required
                />
              </div>
            </div>

            <div class="checkbox-row">
              <input type="checkbox" id="agree" required />
              <label for="agree" style="margin: 0; font-weight: 400">
                Tôi đồng ý cung cấp thông tin để đăng ký và sử dụng dịch vụ tại
                kiosk.
              </label>
            </div>

            <button type="submit" class="submit-btn" id="registerSubmitBtn">
              Tạo tài khoản
            </button>

            <div id="registerMessage" class="message"></div>
          </form>
        </div>

        <div class="footer-note">
          Sau khi hoàn tất, bạn có thể quay lại màn hình kiosk để tiếp tục trải
          nghiệm.
        </div>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id") || "";

      document.getElementById("login_session_id").value = sessionId;
      document.getElementById("register_session_id").value = sessionId;

      const showLoginBtn = document.getElementById("showLoginBtn");
      const showRegisterBtn = document.getElementById("showRegisterBtn");
      const loginPanel = document.getElementById("loginPanel");
      const registerPanel = document.getElementById("registerPanel");
      const showStaffBtn = document.getElementById("showStaffBtn");
      const staffPanel = document.getElementById("staffPanel");

      function switchPanel(type) {
        showLoginBtn.classList.toggle("active", type === "login");
        showStaffBtn.classList.toggle("active", type === "staff");
        showRegisterBtn.classList.toggle("active", type === "register");

        loginPanel.classList.toggle("active", type === "login");
        staffPanel.classList.toggle("active", type === "staff");
        registerPanel.classList.toggle("active", type === "register");

        document.getElementById("loginMessage").textContent = "";
        document.getElementById("registerMessage").textContent = "";
        document.getElementById("staffMessage").textContent = "";
      }

      showLoginBtn.addEventListener("click", () => switchPanel("login"));
      showRegisterBtn.addEventListener("click", () => switchPanel("register"));
      showStaffBtn.addEventListener("click", () => switchPanel("staff"));

      const loginForm = document.getElementById("loginForm");
      const registerForm = document.getElementById("registerForm");

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const loginMessage = document.getElementById("loginMessage");
        const loginSubmitBtn = document.getElementById("loginSubmitBtn");

        loginMessage.textContent = "";
        loginMessage.className = "message";

        const payload = {
          phone: document.getElementById("login_phone").value.trim(),
          password: document.getElementById("login_password").value.trim(),
          session_id: document.getElementById("login_session_id").value.trim(),
        };

        if (!payload.phone || !payload.password) {
          loginMessage.textContent = "Vui lòng nhập số điện thoại và mật khẩu.";
          loginMessage.classList.add("error");
          return;
        }

        loginSubmitBtn.disabled = true;
        loginSubmitBtn.textContent = "Đang đăng nhập...";

        try {
          const res = await fetch("/api/user/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.message || "Đăng nhập thất bại");
          }

          if (data?.data?.access_token) {
            localStorage.setItem("user_access_token", data.data.access_token);
          }
          if (data?.data?.refresh_token) {
            localStorage.setItem("user_refresh_token", data.data.refresh_token);
          }
          if (data?.data?.user) {
            localStorage.setItem(
              "user_profile",
              JSON.stringify(data.data.user),
            );
          }

          loginMessage.textContent =
            "Đăng nhập thành công. Bạn có thể quay lại màn hình kiosk.";
          loginMessage.classList.add("success");

          setTimeout(() => {
            window.close();

            setTimeout(() => {
              window.location.href = "about:blank";
            }, 300);
          }, 1200);

          loginForm.reset();
          document.getElementById("login_session_id").value = sessionId;
        } catch (err) {
          loginMessage.textContent = err.message || "Có lỗi xảy ra";
          loginMessage.classList.add("error");
        } finally {
          loginSubmitBtn.disabled = false;
          loginSubmitBtn.textContent = "Đăng nhập";
        }
      });

      const staffForm = document.getElementById("staffForm");

      staffForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const msg = document.getElementById("staffMessage");
        const btn = document.getElementById("staffSubmitBtn");

        msg.textContent = "";
        msg.className = "message";

        const payload = {
          phone: document.getElementById("staff_phone").value.trim(),
          password: document.getElementById("staff_password").value.trim(),
          session_id: sessionId,
        };

        if (!payload.phone || !payload.password) {
          msg.textContent = "Vui lòng nhập đầy đủ thông tin";
          msg.classList.add("error");
          return;
        }

        btn.disabled = true;
        btn.textContent = "Đang đăng nhập...";

        try {
          const res = await fetch("/api/staff/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.message || "Đăng nhập thất bại");
          }

          // 🔥 lưu token staff
          localStorage.setItem("staff_access_token", data.data.access_token);
          localStorage.setItem(
            "staff_profile",
            JSON.stringify(data.data.staff),
          );

          msg.textContent = "Đăng nhập nhân viên thành công";
          msg.classList.add("success");

          setTimeout(() => {
            window.close();
          }, 1000);
        } catch (err) {
          msg.textContent = err.message || "Có lỗi xảy ra";
          msg.classList.add("error");
        } finally {
          btn.disabled = false;
          btn.textContent = "Đăng nhập nhân viên";
        }
      });

      registerForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const registerMessage = document.getElementById("registerMessage");
        const registerSubmitBtn = document.getElementById("registerSubmitBtn");

        registerMessage.textContent = "";
        registerMessage.className = "message";

        const payload = {
          full_name: document.getElementById("full_name").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          gender: document.getElementById("gender").value,
          password: document.getElementById("password").value.trim(),
          session_id: document
            .getElementById("register_session_id")
            .value.trim(),

          // giữ lại để sau nếu backend có xử lý
          email: document.getElementById("email").value.trim(),
          address: document.getElementById("address").value.trim(),
        };

        if (!payload.full_name || !payload.phone || !payload.password) {
          registerMessage.textContent =
            "Vui lòng nhập đầy đủ họ tên, số điện thoại và mật khẩu.";
          registerMessage.classList.add("error");
          return;
        }

        registerSubmitBtn.disabled = true;
        registerSubmitBtn.textContent = "Đang xử lý...";

        try {
          const res = await fetch("/api/user/auth/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.message || "Đăng ký thất bại");
          }

          // Lưu token để dùng tiếp nếu cần
          if (data?.data?.access_token) {
            localStorage.setItem("user_access_token", data.data.access_token);
          }
          if (data?.data?.refresh_token) {
            localStorage.setItem("user_refresh_token", data.data.refresh_token);
          }
          if (data?.data?.user) {
            localStorage.setItem(
              "user_profile",
              JSON.stringify(data.data.user),
            );
          }

          registerMessage.textContent =
            "Đăng ký thành công. Bạn có thể quay lại màn hình kiosk.";
          registerMessage.classList.add("success");

          setTimeout(() => {
            window.close();
            setTimeout(() => {
              window.location.href = "about:blank";
            }, 300);
          }, 1200);

          registerForm.reset();
          document.getElementById("register_session_id").value = sessionId;
        } catch (err) {
          registerMessage.textContent = err.message || "Có lỗi xảy ra";
          registerMessage.classList.add("error");
        } finally {
          registerSubmitBtn.disabled = false;
          registerSubmitBtn.textContent = "Tạo tài khoản";
        }
      });
    </script>
  </body>
</html>
